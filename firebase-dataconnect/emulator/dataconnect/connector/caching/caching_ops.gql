mutation CachingMixed_Insert(
  $string: String!,
  $stringNullable: String,
  $float: Float!,
  $floatNullable: Float,
  $boolean: Boolean!,
  $booleanNullable: Boolean,
  $any: Any!,
  $anyNullable: Any,
  $stringList: [String!],
  $floatList: [Float!],
  $booleanList: [Boolean!],
  $anyList: [Any!],
  $tag: String,
) @auth(level: PUBLIC) {
  key: cachingMixed_insert(data: {
    string: $string,
    stringNullable: $stringNullable,
    float: $float,
    floatNullable: $floatNullable,
    boolean: $boolean,
    booleanNullable: $booleanNullable,
    any: $any,
    anyNullable: $anyNullable,
    stringList: $stringList,
    floatList: $floatList,
    booleanList: $booleanList,
    anyList: $anyList,
    tag: $tag,
  })
}

