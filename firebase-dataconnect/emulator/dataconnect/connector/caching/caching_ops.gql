###############################################################################
# CachingString
###############################################################################

mutation CachingString_Insert($string: String!, $tag: String) @auth(level: PUBLIC) {
  key: cachingString_insert(data: {string: $string, tag: $tag})
}

mutation CachingString_Update($key: CachingString_Key!, $string: String!) @auth(level: PUBLIC) {
  cachingString_update(key: $key, data: {string: $string})
}

query CachingString_GetByKey($key: CachingString_Key!) @auth(level: PUBLIC) {
  item: cachingString(key: $key) { string }
}

query CachingString_GetByKey2($key: CachingString_Key!) @auth(level: PUBLIC) {
  item: cachingString(key: $key) { string }
}

query CachingString_GetByTag($tag: String!) @auth(level: PUBLIC) {
  items: cachingStrings(where: {tag: {eq: $tag}}) { id string }
}

query CachingString_GetByTag2($tag: String!) @auth(level: PUBLIC) {
  items: cachingStrings(where: {tag: {eq: $tag}}) { id string }
}

