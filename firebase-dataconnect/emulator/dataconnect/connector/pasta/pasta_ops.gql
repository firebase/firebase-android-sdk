mutation Pasta_Insert($name: String!) @auth(level: PUBLIC) {
  key: pasta_insert(data: {name: $name})
}

mutation Pasta_Update($key: Pasta_Key!, $name: String!) @auth(level: PUBLIC) {
  pasta_update(key: $key, data: {name: $name})
}

query Pasta_GetByKey($key: Pasta_Key!)
  @auth(level: PUBLIC)
  @refresh(onMutationExecuted: {
    operation: "Pasta_Update",
    condition: "request.variables.key == mutation.variables.key",
  })
{
  item: pasta(key: $key) { name }
}
