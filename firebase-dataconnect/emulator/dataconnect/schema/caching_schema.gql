###############################################################################
# String scalars
###############################################################################

type CachingString @table {
  string: String!
  tag: String
}

type CachingNullableString @table {
  string: String
  tag: String
}

type CachingStringList @table {
  strings: [String!]!
  tag: String
}

type CachingNullableStringList @table {
  strings: [String]!
  tag: String
}

type CachingStringNullableList @table {
  strings: [String!]
  tag: String
}

type CachingNullableStringNullableList @table {
  strings: [String]
  tag: String
}

###############################################################################
# Float scalars
###############################################################################

type CachingFloat @table {
  float: Float!
  tag: String
}

type CachingNullableFloat @table {
  float: Float
  tag: String
}

###############################################################################
# Boolean scalars
###############################################################################

type CachingBoolean @table {
  boolean: Boolean!
  tag: String
}

type CachingNullableBoolean @table {
  boolean: Boolean
  tag: String
}

###############################################################################
# Any scalars
###############################################################################

type CachingAny @table {
  any: Any!
  tag: String
}

type CachingNullableAny @table {
  any: Any
  tag: String
}
