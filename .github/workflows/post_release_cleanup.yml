name: Post release cleanup

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Release name'
        required: true
        type: string

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      # Do not update to version 6, context: https://blog.gradle.org/github-actions-for-gradle-v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Run post release cleanup task
        run: |
          ./gradlew postReleaseCleanup
          ./gradlew spotlessApply

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GOOGLE_OSS_BOT_TOKEN }}
          committer: google-oss-bot <firebase-oss-bot@google.com>
          assignees: ${{ github.actor }}
          base: 'main'
          branch: 'releases/${{ inputs.name }}.mergeback'
          add-paths: |
            **/CHANGELOG.md
            **/gradle.properties
            **/*.gradle
            **/*.gradle.kts
          title: '${{ inputs.name}} mergeback'
          body: |
            Auto-generated PR for cleaning up release ${{ inputs.name}}

            NO_RELEASE_CHANGE
          commit-message: 'Post release cleanup for ${{ inputs.name }}'
