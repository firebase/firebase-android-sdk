Perfect! I’ll merge the Gradle‑style CI (build, test, dependency graph) with the Blazor WASM → GitHub Pages CD into one clean workflow.
It runs on every push/PR to main, and automatically deploys the latest Blazor build to GitHub Pages when the main branch is updated. You can easily change the deploy trigger to a version tag instead.

```yaml
# .github/workflows/dotnet-ci-cd-pages.yml
name: .NET CI/CD – GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual runs

permissions:
  contents: write      # for dependency graph & gh-pages push
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'
  BLAZOR_PROJECT: './src/MyBlazorApp/MyBlazorApp.csproj'   # <-- update to your project

jobs:
  # ── CI: Build, Test, Dependency Graph ─────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.vbproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.BLAZOR_PROJECT }}
      - name: Build
        run: dotnet build ${{ env.BLAZOR_PROJECT }} --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal || true   # remove '|| true' if you have tests

      # Publish the Blazor app (artifact for deployment job)
      - name: Publish Blazor
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet publish ${{ env.BLAZOR_PROJECT }} -c Release -o ./published
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: blazor-app
          path: ./published/wwwroot

  # ── Dependency Submission (like Gradle's dependency-submission) ──
  dependency-submission:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Submit dependencies to GitHub dependency graph
        uses: microsoft/dependency-submission-toolkit@v1
        with:
          project-files: |
            ${{ env.BLAZOR_PROJECT }}

  # ── CD: Deploy to GitHub Pages (only on push to main) ──
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-app
          path: ./wwwroot

      # If your repo is not <username>.github.io, fix the base href
      - name: Set base path
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          if [ "$REPO_NAME" != "${{ github.repository_owner }}.github.io" ]; then
            sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|" ./wwwroot/index.html
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./wwwroot
          publish_branch: gh-pages
          force_orphan: true
```

---

🧠 What this gives you

Job When What it does
build-and-test Every push/PR Restores, builds, tests & publishes Blazor. Uploads artifact on main.
dependency-submission After build-and-test Feeds your NuGet dependency graph to GitHub (like the Gradle submission job).
deploy-pages Only on push to main Downloads the Blazor artifact, adjusts base tag, deploys to gh-pages.

---

⚙️ Adjustments you’ll want to make

1. BLAZOR_PROJECT – set the correct path to your .csproj.
2. Test step – remove || true if you have test projects; I added it so the workflow doesn’t fail when no tests are found.
3. Deploy trigger – switch if: github.ref == 'refs/heads/main' to if: startsWith(github.ref, 'refs/tags/v') if you want to deploy only on version tags.
4. Dependency graph – works automatically with GitHub’s Dependabot / supply‑chain features.

---

🚀 After the first successful run

Go to Settings → Pages → set source to Deploy from a branch → gh-pages → / (root) → Save.
Your Blazor app will be live at https://<username>.github.io/<repo>.

