name: Generate Test Report

on:
  schedule:
    - cron: 51 8 * * *  # Runs automatically once a day
  workflow_dispatch:   # Allow triggering the workflow manually

permissions:
  contents: read
  issues: write

jobs:
  report:
    name: "Generate Test Report"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      # Do not update to version 6, context: https://blog.gradle.org/github-actions-for-gradle-v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Generate Test Report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew generateTestReport

      - name: Update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit 7421 --body-file test-report.md
