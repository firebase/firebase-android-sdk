name: Create release

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Release name'
        required: true
        type: string
      past-name:
        description: 'Past release name'
        required: true
        type: string

jobs:
  create-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create base branch
        uses: peterjgrainger/action-create-branch@08259812c8ebdbf1973747f9297e332fa078d3c1
        with:
          branch: 'releases/${{ inputs.name }}'

  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      # Do not update to version 6, context: https://blog.gradle.org/github-actions-for-gradle-v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Create release configuration template
        run: |
          ./gradlew generateReleaseConfig -PcurrentRelease=${INPUTS_NAME} -PpastRelease=${INPUTS_PAST_NAME} -PprintOutput=true
        env:
          INPUTS_NAME: ${{ inputs.name }}
          INPUTS_PAST_NAME: ${{ inputs.past-name }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          base: 'releases/${{ inputs.name }}'
          branch: 'releases/${{ inputs.name }}.release'
          add-paths: release.json,release_report.md,release_report.json
          title: '${{ inputs.name}} release'
          body: 'Auto-generated PR for release ${{ inputs.name}}'
          commit-message: 'Create release config for ${{ inputs.name }}'
